{% extends 'gestion/base.html' %}

{% block title %}Iniciar Sesion - Petroglifos Maule{% endblock %}

{% block extra_css %}
<style>
    .login-card { max-width: 420px; margin: 60px auto 0; padding: 28px; }
    .login-card h2 { margin-top: 0; }
    form { display: flex; flex-direction: column; gap: 14px; }
    form label { font-weight: 600; color: var(--muted); }
    form input { padding: 12px 14px; border-radius: 12px; border: 1px solid var(--stroke); }
    .errorlist { color: #b54d3a; list-style: none; padding: 0; margin: 0; }
</style>
{% endblock %}

{% block content %}
<div class="card login-card">
    <h2>Iniciar sesion</h2>
    <p class="muted">Accede para gestionar tus investigaciones.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Entrar</button>
    </form>
</div>
{% endblock %}
